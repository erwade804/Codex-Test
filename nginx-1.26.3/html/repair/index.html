<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../index.css">
    <script src="repair.js"></script>
    <title>Repair</title>
</head>

<body>
    <header>
        <h1>Repair</h1>
        <nav class="top-nav">
            <a href="../" class="nav-btn">Home</a>
            <a href="https://myschool.mosyle.com/" target="_blank" class="nav-btn">Mosyle</a>
            <div class="dropdown">
                <a class="dropbtn nav-btn">Incident IQ</a>
                <div class="dropdown-content">
                    <a href="https://oxboe.incidentiq.com" target="_blank" class="nav-btn">Help Desk</a>
                    <a href="http://ws-wh-brad/iiq" target="_blank" class="nav-btn">Brad's Desk</a>
                </div>
            </div>
            <a href="https://drive.google.com/drive/folders/0AL8p7-QY94qTUk9PVA" target="_blank" class="nav-btn">IT
                Drive</a>
            <a href="http://srv-boe-sandbox:85/" target="_blank" class="nav-btn">Cards</a>
        </nav>
    </header>
    <main>
        <section class="helpdesk-panel">
            <h3>Repair Letters</h3>
            <div class="center">
                <p><a
                        href="https://docs.google.com/spreadsheets/d/1UyWUk7dGL9UhWfMxWRARNcTSuFlRbM7jvyKEjJoDHM0/edit?gid=669326704#gid=669326704">Repair
                        Spreadsheet</a></p>
                <p><a href="https://drive.google.com/drive/folders/1gcdmalQJ0uG_ySk7YMUi6pcW87obbeKf">Repair Letter
                        Folders</a></p>
            </div>
        </section>

        <section class="helpdesk-panel">
            <h3>Steps to Complete Repair Ticket</h3>
            <label>
                <input type="checkbox">
                1. Highlight the repair ticket in the
                <a href="https://docs.google.com/spreadsheets/d/1UyWUk7dGL9UhWfMxWRARNcTSuFlRbM7jvyKEjJoDHM0/edit?gid=669326704#gid=669326704"
                    target="_blank">spreadsheet</a>
                yellow
            </label>
            <br>
            <label>
                <input type="checkbox">
                2. Repair computer (If apple repair, run diagnostics)
            </label>
            <br>
            <label>
                <input type="checkbox">
                3. Add note in
                <a href="https://myschool.mosyle.com" target="_blank">Mosyle</a>
                for the repair <a href="#Note-Copy" onclick="highlightNoteSection()">note</a>
            </label>
            <br>
            <label>
                <input type="checkbox">
                4. Add fee to
                <a href="https://oxfordcs.powerschool.com/admin" target="_blank">PowerSchool</a>
                if applicable
            </label>
            <br>
            <label>
                <input type="checkbox">
                5. Close the ticket in
                <a href="http://ws-wh-brad/iiq" target="_blank">Incident IQ</a>
            </label>
            <br>
            <label>
                <input type="checkbox">
                6. Put the date in the <a
                    href="https://docs.google.com/spreadsheets/d/1UyWUk7dGL9UhWfMxWRARNcTSuFlRbM7jvyKEjJoDHM0/edit?gid=669326704#gid=669326704"
                    target="_blank">spreadsheet</a>
            </label>
            <br>
            <label>
                <input type="checkbox">
                7. Highlight the repair ticket in the <a
                    href="https://docs.google.com/spreadsheets/d/1UyWUk7dGL9UhWfMxWRARNcTSuFlRbM7jvyKEjJoDHM0/edit?gid=669326704#gid=669326704"
                    target="_blank">spreadsheet</a> green
            </label>
        </section>
        <section class="helpdesk-panel" id="Note-Copy">
            <h3>Mosyle Note Copy</h3>
            <div class="center">
                <p
                    onclick="navigator.clipboard.writeText('AGI In-House repair (Screen) ' + new Date().toLocaleDateString({year:'numeric', month:'numeric', day:'numeric'}) + '\n Student: ')">
                    <u>AGI Screen Repair Note</u>
                </p>
                <p
                    onclick="navigator.clipboard.writeText('Apple In-House repair (Screen) ' + new Date().toLocaleDateString({year:'numeric', month:'numeric', day:'numeric'}) + '\n Student: ')">
                    <u>Apple Screen Repair Note</u>
                </p>
            </div>
        </section>
    </main>
    <footer>
        <p>&thksim;Brought to you by <b>Oxford City Schools IT</b>&thksim;</p>
    </footer>
</body>

</html>
